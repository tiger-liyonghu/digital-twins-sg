# ============================================================
# FIELD 11: monthly_insurance_spend — S$/month
# ============================================================
monthly_insurance_spend:
  provenance: "[DERIVED] from product holdings × typical premiums"
  type: derived
  method: >
    Sum of:
    - IP premium: age-based from MOH comparison table (~$50-300/month)
    - IP rider: +50% of IP premium if has_rider
    - Term life: ~$30-80/month depending on coverage and age
    - WoL: ~$100-300/month (saving component)
    - CI: ~$30-100/month depending on coverage
  typical_ranges:
    no_insurance: 0             # MediShield Life is from MediSave, not cash
    ip_only_young: 40           # 25yo, B1, no rider
    ip_only_old: 250            # 60yo, Private, with rider
    full_suite_young: 300       # 30yo, IP Private + Term + CI + WoL
    full_suite_mid: 500         # 45yo, full suite
    full_suite_old: 800         # 60yo, full suite (expensive)
  constraints:
    ip_gross_premium_per_life: 668  # [HARD] SAS Paper — S$668/year = ~$56/month average
  note: >
    [DERIVED] — computed from product holdings after generation.
    Not sampled independently. Validate against HES insurance spending data.

# ============================================================
# FIELD 12: medisave_balance — S$
# ============================================================
medisave_balance:
  provenance: "[DERIVED] PGS p.131 CPF AR 2021, MediSave ≈ 23% of total CPF"
  type: derived_from_cpf
  medisave_pct_of_cpf: 0.23  # [HARD] S$148.7bn / S$649.3bn (2025 Q3)
  bhs_cap: 71500              # [HARD] CPF BHS 2025
  # Avg total CPF by age (from PGS p.131)
  avg_total_cpf_by_age:
    "0-20":  4058
    "20-25": 10788
    "25-30": 50889
    "30-35": 98337
    "35-40": 138338
    "40-45": 178050
    "45-50": 212119
    "50-55": 222609
    "55-60": 194364
    "60+":   115595
  medisave_pct_by_age:
    "0-20":  0.30   # [ESTIMATED] young, MA contribution rate higher relative to balance
    "20-25": 0.28
    "25-30": 0.25
    "30-35": 0.22   # OA dominant (housing)
    "35-40": 0.22
    "40-45": 0.23
    "45-50": 0.24
    "50-55": 0.26   # MA contribution rate increases with age
    "55-60": 0.28
    "60+":   0.35   # OA depleted, SA→RA, MA relatively larger share
  cv: 0.5

# ============================================================
# FIELD 13: insurance_attitude
# ============================================================
insurance_attitude:
  provenance: "[DERIVED] PGS Section 16 survey data"
  type: categorical_by_demographics
  marginal:
    proactive: 0.20
    adequate: 0.25
    passive: 0.25
    resistant: 0.20
    unaware: 0.10
  conditions:
    # Income is strongest driver (50% can't afford → resistant)
    by_income:
      high:     # >$8,000/month
        proactive: 0.35
        adequate: 0.35
        passive: 0.20
        resistant: 0.05
        unaware: 0.05
      mid:      # $3,000-$8,000
        proactive: 0.22
        adequate: 0.28
        passive: 0.25
        resistant: 0.18
        unaware: 0.07
      low:      # <$3,000
        proactive: 0.08
        adequate: 0.12
        passive: 0.25
        resistant: 0.40
        unaware: 0.15
    # Age modifier
    age_modifier:
      "0-19":  {unaware: 1.5, proactive: 0.3}   # children/teens — parents decide
      "20-29": {passive: 1.2, unaware: 1.3}      # young, haven't thought about it
      "30-44": {proactive: 1.3, adequate: 1.1}   # peak buying, family responsibility
      "45-59": {adequate: 1.2, passive: 1.1}     # settled, may be complacent
      "60+":   {resistant: 1.3, passive: 1.2}    # cost pressure, fixed income

# ============================================================
# FIELD 14: protection_gap_awareness
# ============================================================
protection_gap_awareness:
  provenance: "[DERIVED] PGS: 26% aware mortality gap, 63% aware CI gap"
  type: categorical
  marginal:
    aware_acting: 0.15      # knows gap AND buying more
    aware_inactive: 0.35    # knows gap but not acting (63% CI aware, most not acting)
    unaware: 0.35           # doesn't know gap (74% don't know mortality gap)
    overconfident: 0.15     # thinks coverage sufficient but it's not (31% "sufficient")
  conditions:
    # Strongly correlated with insurance_attitude
    by_attitude:
      proactive:  {aware_acting: 0.70, aware_inactive: 0.20, unaware: 0.05, overconfident: 0.05}
      adequate:   {aware_acting: 0.10, aware_inactive: 0.15, unaware: 0.20, overconfident: 0.55}
      passive:    {aware_acting: 0.05, aware_inactive: 0.60, unaware: 0.25, overconfident: 0.10}
      resistant:  {aware_acting: 0.02, aware_inactive: 0.40, unaware: 0.40, overconfident: 0.18}
      unaware:    {aware_acting: 0.00, aware_inactive: 0.05, unaware: 0.85, overconfident: 0.10}

