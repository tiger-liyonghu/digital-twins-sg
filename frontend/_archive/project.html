<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目管理驾驶舱 | Project Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0e1a; --card:#111827; --border:#1e293b; --text:#e2e8f0;
  --dim:#94a3b8; --muted:#475569; --accent:#3b82f6; --green:#22c55e;
  --red:#ef4444; --orange:#f97316; --purple:#a855f7; --cyan:#06b6d4;
  --yellow:#eab308;
}
body { background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,system-ui,sans-serif; font-size:14px; }

/* NAV */
nav { background:var(--card); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { font-size:20px; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo-sub { font-size:12px; font-weight:400; -webkit-text-fill-color:var(--muted); margin-left:8px; }
.nav-right { display:flex; align-items:center; gap:12px; }
.lang-switch { display:flex; gap:2px; background:var(--bg); border-radius:6px; padding:2px; }
.lang-switch button { background:transparent; border:none; color:var(--dim); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px; font-weight:600; }
.lang-switch button.active { background:var(--accent); color:#fff; }
.nav-link { color:var(--dim); text-decoration:none; font-size:12px; padding:6px 12px; border:1px solid var(--border); border-radius:6px; transition:all .2s; }
.nav-link:hover { color:var(--accent); border-color:var(--accent); }

/* LAYOUT */
.container { max-width:1400px; margin:0 auto; padding:20px 24px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:16px; }
.grid-5 { display:grid; grid-template-columns:repeat(5,1fr); gap:16px; margin-bottom:16px; }
.full { margin-bottom:16px; }

/* CARDS */
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
.card h3 { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:12px; font-weight:600; }
.big { font-size:32px; font-weight:700; line-height:1; margin-bottom:4px; }
.sub { font-size:12px; color:var(--dim); }

/* SECTION TITLE */
.section-title { font-size:16px; font-weight:700; color:var(--text); margin:28px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); }

/* MILESTONE */
.milestone { display:flex; align-items:flex-start; gap:16px; padding:14px 0; border-bottom:1px solid rgba(30,41,59,.5); }
.milestone:last-child { border-bottom:none; }
.ms-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.ms-done { background:rgba(34,197,94,.15); color:var(--green); }
.ms-active { background:rgba(59,130,246,.15); color:var(--accent); animation:pulse 2s infinite; }
.ms-todo { background:rgba(71,85,105,.15); color:var(--muted); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.ms-body { flex:1; }
.ms-title { font-weight:600; font-size:14px; margin-bottom:2px; }
.ms-desc { font-size:12px; color:var(--dim); line-height:1.5; }
.ms-tag { display:inline-block; font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; margin-left:8px; }
.tag-done { background:rgba(34,197,94,.15); color:var(--green); }
.tag-active { background:rgba(59,130,246,.15); color:var(--accent); }
.tag-todo { background:rgba(71,85,105,.15); color:var(--muted); }

/* MODULE TABLE */
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:1px; padding:8px 12px; border-bottom:1px solid var(--border); }
td { padding:10px 12px; border-bottom:1px solid rgba(30,41,59,.4); }
.loc { color:var(--cyan); font-weight:600; }

/* QUALITY GATE */
.gate { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(30,41,59,.4); }
.gate:last-child { border-bottom:none; }
.gate-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.gate-pass { background:var(--green); }
.gate-fail { background:var(--red); }
.gate-name { flex:1; font-weight:500; }
.gate-val { color:var(--dim); font-size:12px; min-width:100px; text-align:right; }
.gate-thresh { color:var(--muted); font-size:11px; min-width:80px; text-align:right; }

/* TECH STACK */
.tech-item { display:inline-flex; align-items:center; gap:6px; background:rgba(59,130,246,.08); border:1px solid rgba(59,130,246,.2); border-radius:8px; padding:8px 14px; margin:4px; font-size:12px; font-weight:500; }

/* ARCH DIAGRAM */
.arch-layer { padding:16px; border-radius:10px; margin-bottom:10px; }
.arch-data { background:rgba(34,197,94,.06); border:1px solid rgba(34,197,94,.2); }
.arch-engine { background:rgba(59,130,246,.06); border:1px solid rgba(59,130,246,.2); }
.arch-llm { background:rgba(168,85,247,.06); border:1px solid rgba(168,85,247,.2); }
.arch-frontend { background:rgba(6,182,212,.06); border:1px solid rgba(6,182,212,.2); }
.arch-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
.arch-items { display:flex; flex-wrap:wrap; gap:6px; }
.arch-chip { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); border-radius:6px; padding:4px 10px; font-size:11px; color:var(--dim); }

/* PROGRESS BAR */
.progress-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin-top:8px; }
.progress-fill { height:100%; border-radius:4px; transition:width .3s; }

/* COST */
.cost-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(30,41,59,.4); font-size:13px; }
.cost-row:last-child { border-bottom:none; }
</style>
</head>

let currentLang = 'zh';
function t(k) { return I18N[currentLang][k] || I18N.en[k] || k; }

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-switch button[onclick="setLang('${lang}')"]`).classList.add('active');
  render();
}

function render() {
  // i18n simple
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });

  // Milestones
  const milestones = [
    { key: 'ms1', status: 'done', icon: '1' },
    { key: 'ms2', status: 'done', icon: '2' },
    { key: 'ms3', status: 'done', icon: '3' },
    { key: 'ms4', status: 'done', icon: '4' },
    { key: 'ms5', status: 'done', icon: '5' },
    { key: 'ms6', status: 'done', icon: '6' },
    { key: 'ms7', status: 'active', icon: '7' },
    { key: 'ms8', status: 'todo', icon: '8' },
  ];
  document.getElementById('milestones').innerHTML = milestones.map(m => {
    const cls = m.status === 'done' ? 'ms-done' : m.status === 'active' ? 'ms-active' : 'ms-todo';
    const tagCls = m.status === 'done' ? 'tag-done' : m.status === 'active' ? 'tag-active' : 'tag-todo';
    return `<div class="milestone">
      <div class="ms-icon ${cls}">${m.icon}</div>
      <div class="ms-body">
        <div class="ms-title">${t(m.key+'_title')}<span class="ms-tag ${tagCls}">${t(m.status)}</span></div>
        <div class="ms-desc">${t(m.key+'_desc')}</div>
      </div>
    </div>`;
  }).join('');

  // Architecture
  const layers = [
    { cls: 'arch-data', label: 'arch_data', items: ['GHS 2025 CSV', 'IPF 4D Table', 'agents_20k_v2.csv', 'Supabase PostgreSQL'] },
    { cls: 'arch-engine', label: 'arch_engine', items: ['IPF + Rounding', 'BayesianNetwork', 'MarginalCalibrator', 'HouseholdBuilder', 'PersonalityInit', 'SynthesisGate'] },
    { cls: 'arch-llm', label: 'arch_llm', items: ['LLM Chat API', 'Persona Prompt', 'Stratified Sampling', 'Response Aggregator'] },
    { cls: 'arch-frontend', label: 'arch_frontend', items: ['Data Dashboard (index.html)', 'Project Dashboard (project.html)', 'Chart.js', 'Supabase JS SDK'] },
  ];
  document.getElementById('arch').innerHTML = layers.map(l =>
    `<div class="arch-layer ${l.cls}">
      <div class="arch-label" style="color:inherit;">${t(l.label)}</div>
      <div class="arch-items">${l.items.map(i => `<div class="arch-chip">${i}</div>`).join('')}</div>
    </div>`
  ).join('');

  // Tech Stack
  const techs = ['tech_python','tech_numpy','tech_supabase','tech_llm','tech_html','tech_ipf','tech_bn','tech_copula','tech_srmse'];
  document.getElementById('techstack').innerHTML = techs.map(k => `<span class="tech-item">${t(k)}</span>`).join('');

  // Quality Gates
  const gates = [
