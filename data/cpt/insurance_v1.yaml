# ============================================================
# Insurance Profile CPT v1.0
# Conditional Probability Tables for 17 insurance fields
# Source: insurance_profile_research_v1.md (v1.2)
# ============================================================
#
# Provenance tags:
#   [HARD]    = directly from source table
#   [DERIVED] = calculated from hard data (division, dedup adjustment)
#   [ESTIMATED] = inferred, constrained by marginals
#
# All marginal targets must be hit after generation.
# CPT values are P(field | conditions).

meta:
  version: "v1.0"
  research_doc: "insurance_profile_research_v1.md"
  population: 172173
  data_year: 2022  # LIA PGS reference year
  created: "2026-03-11"

# ============================================================
# MARGINAL TARGETS — generation MUST reproduce these
# ============================================================
marginal_targets:
  has_medishield_life: 1.000            # [HARD] CPF — universal
  has_ip: 0.710                         # [HARD] MOH Nov 2025
  has_rider_given_ip: 0.670             # [HARD] MOH Nov 2025
  has_term_life: 0.170                  # [DERIVED] PGS T68/T58: 827,184/4,866,852
  has_whole_life: 0.336                 # [DERIVED] PGS T68/T58: 1,635,081/4,866,852
  has_ci: 0.306                         # [DERIVED] PGS p.59/T58: 1,491,042/4,866,852
  ip_tier_given_ip:                     # [HARD] MOH official statement
    private: 0.563                      #   40% of residents / 71% IP rate
    A: 0.282                            #   20% / 71%
    B1: 0.141                           #   10% / 71%
    standard: 0.014                     #   <1% / 71%
  insurance_attitude:                   # [DERIVED] PGS Section 16
    proactive: 0.20
    adequate: 0.25
    passive: 0.25
    resistant: 0.20
    unaware: 0.10

# ============================================================
# FIELD 1: has_medishield_life
# ============================================================
has_medishield_life:
  provenance: "[HARD] CPF — auto-enrolled for all SC+PR"
  type: deterministic
  value: true
  # Only false for non-SC/PR (EP, SP, WP, FDW, DP, STP)
  condition: "residency_status IN ('Citizen', 'PR')"
  note: "Our 172K population is SC+PR only, so always true"

# ============================================================
# FIELD 2: has_ip — P(IP | age)
# ============================================================
has_ip:
  provenance: "[HARD] overall 71% MOH; age distribution [ESTIMATED]"
  type: conditional
  marginal: 0.710
  conditions:
    # Age is the primary driver; income modulates within age band
    # Young children have IP (parents buy); teens/young adults may lapse
    # Working age high; elderly may drop due to premium
    by_age:
      "0-4":   0.55   # [ESTIMATED] parents buy for children, but not all
      "5-9":   0.55
      "10-14": 0.55
      "15-19": 0.55   # some lapse as transition to own policy
      "20-24": 0.60   # starting to buy own
      "25-29": 0.72   # above average — entering workforce
      "30-34": 0.80   # peak buying period
      "35-39": 0.82
      "40-44": 0.83
      "45-49": 0.82
      "50-54": 0.78
      "55-59": 0.73
      "60-64": 0.68
      "65-69": 0.62
      "70+":   0.50   # [ESTIMATED] premium burden, some drop out
    # Income modifier (multiplied with age rate, then renormalized)
    income_modifier:
      low:    0.85    # <$2,000/month — less likely to afford IP
      mid:    1.00    # $2,000-$6,000
      high:   1.10    # >$6,000 — almost certain to have IP
  note: >
    Age distribution is [ESTIMATED] — no public data on IP by age.
    Overall 71% is [HARD]. SAS paper says 3.99M lives covered (2023).
    Income modifier keeps lower-income slightly below average.
    Must calibrate to hit 71% marginal after generation.

# ============================================================
# FIELD 3: ip_tier — P(tier | has_ip, income, housing)
# ============================================================
ip_tier:
  provenance: "[HARD] MOH: Private 40%, A 20%, B1 10%, Standard <1% of all residents"
  type: conditional
  marginal:
    private: 0.563
    A: 0.282
    B1: 0.141
    standard: 0.014
  conditions:
    # Income × Housing → tier preference
    # High income + private housing → almost always Private tier
    # Low income + HDB 1-2 → mostly B1 or A
    by_income_housing:
      high_private:   # income > $8,000 AND housing IN (Condo, Landed)
        private: 0.90
        A: 0.08
        B1: 0.02
        standard: 0.00
      high_hdb:       # income > $8,000 AND housing = HDB
        private: 0.75
        A: 0.18
        B1: 0.06
        standard: 0.01
      mid_high:       # income $5,000-$8,000
        private: 0.65
        A: 0.25
        B1: 0.09
        standard: 0.01
      mid:            # income $3,000-$5,000
        private: 0.50
        A: 0.32
        B1: 0.16
        standard: 0.02
      low_mid:        # income $1,500-$3,000
        private: 0.30
        A: 0.35
        B1: 0.30
        standard: 0.05
      low:            # income < $1,500 or unemployed
        private: 0.15
        A: 0.30
        B1: 0.40
        standard: 0.15
  note: >
    Marginal is [HARD] from MOH. Conditional breakdown is [ESTIMATED]
    but tightly constrained: must marginalize to 56.3/28.2/14.1/1.4.

# ============================================================
# FIELD 4: has_rider — P(rider | has_ip)
# ============================================================
has_rider:
  provenance: "[HARD] overall 67% of IP holders; age [ESTIMATED]"
  type: conditional
  marginal_given_ip: 0.670
  conditions:
    by_age:
      "0-19":  0.72   # parents buy comprehensive
      "20-34": 0.73   # young, affordable premiums
      "35-49": 0.70   # peak, but premiums rising
      "50-59": 0.65   # cost pressure
      "60-69": 0.58   # significant cost pressure
      "70+":   0.48   # [ESTIMATED] many drop rider due to cost

# ============================================================
# FIELD 5: ip_insurer — P(insurer | has_ip)
# ============================================================
ip_insurer:
  provenance: "[ESTIMATED] no public market share data"
  type: categorical
  distribution:
    AIA: 0.22          # largest life insurer in SG
    GE: 0.20           # Great Eastern — OCBC-linked, strong local
    Prudential: 0.18
    NTUC: 0.18         # NTUC Income — cooperative, popular with heartlanders
    Singlife: 0.12     # newer, digital-first
    Raffles: 0.10      # niche, Raffles Hospital-linked
  note: "[ESTIMATED] — based on general life insurance market share proxies"

# ============================================================
# FIELD 6: has_term_life — P(term | age)
# ============================================================
has_term_life:
  provenance: "[DERIVED] PGS Table 68 Term lives / Table 58 population"
  type: conditional
  marginal: 0.170
  conditions:
    by_age:
      "0-4":   0.028
      "5-9":   0.031
      "10-14": 0.040
      "15-19": 0.048
      "20-24": 0.098
      "25-29": 0.210
      "30-34": 0.354
      "35-39": 0.382
      "40-44": 0.393
      "45-49": 0.443
      "50-54": 0.380
      "55-59": 0.229
      "60-64": 0.158
      "65-69": 0.093
      "70+":   0.019
    # Marital modifier — married with dependents more likely
    marital_modifier:
      Married: 1.15
      Single: 0.80
      Divorced: 0.95
      Widowed: 0.70
  note: >
    Age rates are [DERIVED] from hard data (T68/T58).
    Marital modifier is [ESTIMATED] — logical (dependents drive term purchase).
    Must renormalize after applying modifier to hit 17.0% marginal.

# ============================================================
# FIELD 7: term_life_coverage — S$ amount given has_term_life
# ============================================================
term_life_coverage:
  provenance: "[HARD] PGS Table 66 Term column"
  type: lognormal_by_age
  # Mean coverage by age (from Table 66)
  mean_by_age:
    "0-4":   221327
    "5-9":   212567
    "10-14": 185508
    "15-19": 205044
    "20-24": 273837
    "25-29": 406756
    "30-34": 417242
    "35-39": 450602
    "40-44": 421793
    "45-49": 295218
    "50-54": 213810
    "55-59": 150972
    "60-64": 81416
    "65-69": 46940
    "70+":   45483
  cv: 0.6  # coefficient of variation (assumed, typical for insurance)
  income_elasticity: 0.4  # higher income → higher coverage, but sublinear
  note: >
    Mean values are [HARD] from PGS Table 66.
    CV and income_elasticity are [ESTIMATED].
    Generate: log(coverage) ~ Normal(log(mean_age) + 0.4*log(income/median_income), sigma)

# ============================================================
