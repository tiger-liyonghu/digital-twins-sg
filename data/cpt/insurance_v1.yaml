      "50-64": {agent_tied: 0.55, ifa: 0.22, online: 0.05, bank: 0.12, employer: 0.06}
      "65+":   {agent_tied: 0.55, ifa: 0.20, online: 0.03, bank: 0.15, employer: 0.07}

# ============================================================
# FIELD 16: last_life_event_trigger
# ============================================================
last_life_event_trigger:
  provenance: "[DERIVED] PGS S16.2.4 purchase reasons → trigger mapping"
  type: categorical_by_age_marital
  marginal:
    marriage: 0.15
    new_child: 0.20
    health_concern: 0.15
    job_change: 0.10
    home_purchase: 0.10
    aging_parents: 0.08
    none_recent: 0.22
  conditions:
    by_life_phase:
      dependence:       {none_recent: 1.00}   # children
      growth:           {none_recent: 1.00}
      adolescence:      {none_recent: 1.00}
      ns_service:       {none_recent: 0.80, job_change: 0.20}
      establishment:    {job_change: 0.25, marriage: 0.30, home_purchase: 0.20, none_recent: 0.25}
      bearing:          {new_child: 0.40, marriage: 0.15, home_purchase: 0.15, health_concern: 0.10, none_recent: 0.20}
      release:          {health_concern: 0.25, aging_parents: 0.25, none_recent: 0.30, new_child: 0.10, job_change: 0.10}
      retirement_early: {health_concern: 0.30, aging_parents: 0.15, none_recent: 0.40, home_purchase: 0.05, marriage: 0.10}
      decline:          {health_concern: 0.45, none_recent: 0.45, aging_parents: 0.10}
      end_of_life:      {health_concern: 0.40, none_recent: 0.60}

# ============================================================
# FIELD 17: annual_hospitalization_freq
# ============================================================
annual_hospitalization_freq:
  provenance: "[ESTIMATED] MOH data exists but blocked; using 2009 baseline + aging pattern"
  type: continuous_by_age
  # Rate per person per year (not per 1000)
  # 2009 baseline: 0-14 ~0.09, 15-64 ~0.07, 65+ ~0.31
  # Adjusted upward ~10% for aging population 2009→2023
  by_age:
    "0-4":   0.12    # higher for infants
    "5-14":  0.06
    "15-24": 0.05
    "25-34": 0.06    # includes maternity
    "35-44": 0.06
    "45-54": 0.08
    "55-64": 0.12
    "65-74": 0.25
    "75+":   0.45
  health_modifier:
    Healthy: 0.7
    Chronic_Mild: 1.5
    Chronic_Severe: 3.0
    Disabled: 2.5
  note: >
    [ESTIMATED] — MOH 2023 data exists (data.gov.sg) but was rate-limited.
    Using 2009 pattern with ~10% uplift. Should be replaced with actual
    2023 data when available. TODO: manually fetch from MOH website.

# ============================================================
# GENERATION ORDER (dependency graph)
# ============================================================
generation_order:
  - has_medishield_life  # deterministic, no deps
  - has_ip               # depends on age, income
  - ip_tier              # depends on has_ip, income, housing
  - has_rider            # depends on has_ip, age
  - ip_insurer           # depends on has_ip
  - has_whole_life       # depends on age
  - has_term_life        # depends on age, marital
  - has_ci               # depends on age
  - term_life_coverage   # depends on has_term_life, age, income
  - ci_coverage          # depends on has_ci, age, gender
  - insurance_attitude   # depends on income, age
  - protection_gap_awareness  # depends on insurance_attitude
  - preferred_channel    # depends on age
  - last_life_event_trigger   # depends on life_phase
  - medisave_balance     # depends on age
  - annual_hospitalization_freq  # depends on age, health_status
  - monthly_insurance_spend      # LAST: derived from all product holdings
