      "0-4":   0.198
      "5-9":   0.208
      "10-14": 0.245
      "15-19": 0.279
      "20-24": 0.379
      "25-29": 0.492
      "30-34": 0.551
      "35-39": 0.549
      "40-44": 0.578
      "45-49": 0.596
      "50-54": 0.562
      "55-59": 0.486
      "60-64": 0.398
      "65-69": 0.319
      "70+":   0.147

# ============================================================
