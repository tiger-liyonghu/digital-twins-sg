<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0e1a; --card:#111827; --border:#1e293b; --text:#e2e8f0;
  --dim:#94a3b8; --muted:#475569; --accent:#3b82f6; --green:#22c55e;
  --red:#ef4444; --orange:#f97316; --purple:#a855f7; --cyan:#06b6d4;
  --yellow:#eab308; --pink:#ec4899;
}
body { background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,system-ui,sans-serif; font-size:14px; }
nav { background:var(--card); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { font-size:20px; font-weight:700; background:linear-gradient(135deg,var(--accent),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo-sub { font-size:12px; font-weight:400; -webkit-text-fill-color:var(--muted); margin-left:8px; }
.nav-right { display:flex; align-items:center; gap:12px; }
.lang-switch { display:flex; gap:2px; background:var(--bg); border-radius:6px; padding:2px; }
.lang-switch button { background:transparent; border:none; color:var(--dim); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:11px; font-weight:600; }
.lang-switch button.active { background:var(--accent); color:#fff; }
.nav-link { color:var(--dim); text-decoration:none; font-size:12px; padding:6px 12px; border:1px solid var(--border); border-radius:6px; transition:all .2s; }
.nav-link:hover { color:var(--accent); border-color:var(--accent); }

.container { max-width:1600px; margin:0 auto; padding:20px 24px; }
.section-title { font-size:16px; font-weight:700; color:var(--text); margin:32px 0 16px; padding-bottom:8px; border-bottom:1px solid var(--border); }

/* Architecture canvas */
.arch-container { position:relative; width:100%; overflow-x:auto; }

svg { display:block; margin:0 auto; }
svg text { font-family:'Inter',-apple-system,system-ui,sans-serif; }
.layer-bg { rx:12; ry:12; stroke-width:1; }
.layer-label { font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.box { rx:8; ry:8; stroke-width:1.5; cursor:default; transition:opacity .2s; }
.box:hover { opacity:0.85; }
.box-title { font-size:11px; font-weight:700; }
.box-sub { font-size:9px; fill:var(--dim); }
.arrow { stroke-width:1.5; fill:none; marker-end:url(#arrowhead); }
.arrow-data { stroke:#3b82f6; opacity:0.6; }
.arrow-control { stroke:#a855f7; opacity:0.5; stroke-dasharray:6,4; }
.arrow-event { stroke:#f97316; opacity:0.6; }
.arrow-result { stroke:#22c55e; opacity:0.6; }
.badge { font-size:8px; font-weight:600; }
.legend-item { font-size:11px; fill:var(--dim); }

/* Detail panels */
.detail-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(340px, 1fr)); gap:16px; margin-top:16px; }
.detail-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
.detail-card h3 { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px; font-weight:600; }
.detail-card .color-green { color:var(--green); }
.detail-card .color-accent { color:var(--accent); }
.detail-card .color-purple { color:var(--purple); }
.detail-card .color-orange { color:var(--orange); }
.detail-card .color-cyan { color:var(--cyan); }
.detail-card .color-pink { color:var(--pink); }
.detail-card .color-yellow { color:var(--yellow); }
.detail-card .color-red { color:var(--red); }
.detail-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(30,41,59,.3); font-size:12px; }
.detail-row:last-child { border-bottom:none; }
.detail-row .key { color:var(--dim); }
.detail-row .val { color:var(--text); font-weight:500; font-family:Menlo,monospace; font-size:11px; }
.file-list { font-size:11px; color:var(--dim); line-height:1.8; font-family:Menlo,monospace; }
.file-list .loc { color:var(--muted); font-size:10px; }

/* Data flow diagram */
.flow-diagram { font-family:Menlo,Consolas,monospace; font-size:11px; background:rgba(0,0,0,.3); padding:20px; border-radius:10px; border:1px solid var(--border); color:var(--cyan); line-height:1.9; white-space:pre; overflow-x:auto; margin:16px 0; }
</style>
</head>
