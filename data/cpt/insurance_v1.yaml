      "15-19": 0.235
      "20-24": 0.353
      "25-29": 0.539
      "30-34": 0.645
      "35-39": 0.653
      "40-44": 0.639
      "45-49": 0.589
      "50-54": 0.472
      "55-59": 0.348
      "60-64": 0.236
      "65-69": 0.140
      "70+":   0.046
